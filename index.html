<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Portfolio Design with Interactive Wave</title>
    <style>
        /* CSS Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        /* Professional Deep Black with Minimal Vignette */
        body {
            min-height: 100vh;
            background-color: #000000;
            /* Very dark grey in the center fading to pure black creates a deep, premium look */
            background-image: radial-gradient(circle at center, #0f0f0f 0%, #000000 100%);
            color: #ffffff;
            overflow: hidden; 
            position: relative;
        }

        /* Canvas for Interactive Wave Dots */
        #wave-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        /* Transparent Header */
        .glass-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1000;
        }

        .brand-logo {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #ffffff;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .nav-link {
            text-decoration: none;
            color: #a3a3a3;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: #ffffff;
        }

        .btn-connect {
            border: 1px solid #ffffff;
            padding: 8px 22px;
            border-radius: 30px;
            color: #961919;
            transition: all 0.3s ease;
        }

        .btn-connect:hover {
            background: #ffffff;
            color: #000000;
        }

        /* 3D Scene Setup */
        .scene {
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px; 
            position: relative;
            z-index: 10;
        }

        /* The 3D Interactive Card */
        .card-3d {
            width: 600px;
            height: 400px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transform-style: preserve-3d;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8),
                        inset 0 0 20px rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(8px);
            transition: transform 0.2s ease-out;
        }

        .card-3d h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            transform: translateZ(80px); 
            text-shadow: 0 10px 20px rgba(0,0,0,0.8);
        }

        .card-3d p {
            color: #a3a3a3;
            font-size: 1.2rem;
            transform: translateZ(50px);
        }
        
        .card-3d .btn-glow {
            margin-top: 30px;
            padding: 12px 30px;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transform: translateZ(60px);
            transition: box-shadow 0.3s ease;
        }

        .card-3d .btn-glow:hover {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>

    <!-- Background Wave Canvas -->
    <canvas id="wave-canvas"></canvas>

    <!-- Transparent Header -->
    <header class="glass-header">
        <a href="#" class="brand-logo">AudioXedit
        <nav class="nav-links">
            <a href="https://github.com/nakulcodebase" target="_blank" class="nav-link">GitHub Profile</a>
            <a href="#connect" class="nav-link btn-connect">Connect Us</a>
        </nav>
    </header>

    <!-- 3D Environment -->
    <main class="scene">
        <div class="card-3d" id="tilt-card">
            <h1>Creative Developer</h1>
            <p>Move your mouse to interact with the card and the wave particles.</p>
            <button class="btn-glow">View Projects</button>
        </div>
    </main>

    <script>
        // --- 1. 3D Card Tilt Logic ---
        const card = document.getElementById('tilt-card');
        const scene = document.querySelector('.scene');
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            let xAxis = (window.innerWidth / 2 - mouseX) / 25;
            let yAxis = (window.innerHeight / 2 - mouseY) / 25;
            
            card.style.transition = "none";
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        scene.addEventListener('mouseleave', () => {
            card.style.transition = "transform 0.5s ease-out";
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

        // --- 2. Interactive Wave Canvas Logic ---
        const canvas = document.getElementById('wave-canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];
        const particleCount = 200; 

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        for (let i = 0; i < particleCount; i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                baseX: Math.random() * width,
                baseY: Math.random() * height,
                size: Math.random() * 2 + 0.5,
                angle: Math.random() * Math.PI * 2,
                speed: Math.random() * 0.02 + 0.01 
            });
        }

        function animateCanvas() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)'; // Slightly reduced opacity for a cleaner look against pure black

            particles.forEach(p => {
                let dx = mouseX - p.baseX;
                let dy = mouseY - p.baseY;
                let distance = Math.sqrt(dx * dx + dy * dy);
                
                let interactionForce = Math.max(0, 250 - distance) / 8;

                p.angle += p.speed;
                
                p.y = p.baseY + Math.sin(p.angle) * (10 + interactionForce);
                p.x = p.baseX + (mouseX - width / 2) * 0.02;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });

            requestAnimationFrame(animateCanvas);
        }
        animateCanvas();
    </script>
</body>
</html>
